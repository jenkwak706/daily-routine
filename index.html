<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Routine</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;700&display=swap" rel="stylesheet">
<style>@import url('https://fonts.googleapis.com/css2?family=Product+Sans:wght@400;700&display=swap');</style>
<style>
  :root{
    --sapphire:#72B0AB;--arctic:#BCDDDC;--lace:#FFEDD1;
    --bubblegum:#FDC1B4;--ballet:#FE9179;--sage:#CFB97E;
    --pistachio:#B89D47;--spruce:#355E58;--peacock:#053229;
    --shadow:rgba(5,50,41,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Google Sans',sans-serif;font-size:16px;background:var(--lace);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:
    radial-gradient(circle at 10% 20%,rgba(188,221,220,0.4) 0%,transparent 40%),
    radial-gradient(circle at 90% 80%,rgba(253,193,180,0.4) 0%,transparent 40%);
    pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;width:100%;max-width:920px;margin:0 auto;padding:8px 8px 40px;}

  /* ── TOPBAR ── */
  .topbar{background:white;border-radius:16px 16px 0 0;padding:0;margin-bottom:0;box-shadow:0 2px 8px var(--shadow);width:fit-content;min-width:100%;max-width:100%;}
  .topbar-app-title{color:var(--peacock);font-size:1.15rem;font-weight:800;padding:10px 14px 4px;letter-spacing:-0.2px;font-family:'Google Sans Display',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topbar-row{display:flex;align-items:flex-end;justify-content:space-between;padding:0 12px 0;}
  .topbar-date{color:var(--spruce);font-size:0.82rem;font-weight:600;padding-bottom:10px;white-space:nowrap;display:flex;align-items:center;gap:2px;}
  .topbar-date button{background:none;border:none;cursor:pointer;font-size:0.95rem;color:var(--spruce);padding:0 3px;line-height:1;}

  /* folder tabs right-aligned */
  .folder-tabs{display:flex;gap:4px;align-items:flex-end;flex-shrink:0;}
  .ftab{
    padding:7px 0 9px;
    width:84px;
    text-align:center;
    border:none;border-radius:10px 10px 0 0;
    font-family:'Google Sans',sans-serif;font-size:0.88rem;font-weight:700;
    cursor:pointer;transition:all 0.15s;
    background:#f0f0f0;color:#888;
    position:relative;bottom:0;
    border:1.5px solid #e0e0e0;border-bottom:none;
  }
  .ftab:hover{background:#e8e8e8;color:var(--peacock);}
  .ftab.active{
    background:var(--lace);color:var(--peacock);
    padding-top:9px;padding-bottom:10px;
    border-color:#ddd;
    margin-bottom:-1px;
  }
  .section{display:none;}.section.active{display:block;}

  /* content area sits on top of folder tabs seamlessly */
  .section-body{background:var(--lace);border-radius:0 0 14px 14px;}

  /* TABLE — wider task col, narrower name cols */

  .table-wrap{border-radius:0 0 14px 14px;box-shadow:0 3px 16px var(--shadow);margin-bottom:12px;background:white;margin-top:0;border-top:4px solid #e8e8e8;}
  .tracker-grid{display:grid;grid-template-columns:minmax(160px,1.8fr) 1fr 1fr 1fr;width:100%;}
  .gh{padding:10px 4px;text-align:center;font-family:'Google Sans Display',sans-serif;font-weight:800;font-size:0.9rem;color:white;position:sticky;top:0;z-index:10;}
  .gh.lbl{background:var(--peacock);text-align:left;padding-left:10px;font-size:0.8rem;min-width:0;}
  .lizzy-h{background:var(--sapphire);}.emily-h{background:var(--ballet);}.claire-h{background:#E8873A;}
  .sec-row{grid-column:1/-1;background:var(--lace);padding:5px 10px;font-family:'Google Sans Display',sans-serif;font-weight:700;color:var(--peacock);font-size:0.82rem;border-top:2px solid rgba(5,50,41,0.07);}
  .task-lbl{padding:6px 10px 6px 10px;font-size:0.82rem;font-weight:700;color:var(--peacock);background:white;border-top:1px solid rgba(5,50,41,0.06);display:flex;align-items:center;word-break:break-word;white-space:normal;line-height:1.3;}
  .check-cell{padding:4px 2px;border-top:1px solid rgba(5,50,41,0.06);display:flex;justify-content:center;align-items:center;background:white;}
  .check-btn{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--kc,var(--sapphire));background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);position:relative;flex-shrink:0;}
  .check-btn:active{transform:scale(0.88);}
  .check-btn.on{background:var(--kc,var(--sapphire));border-color:var(--kc);}
  .check-btn.on::after{content:'✓';color:white;font-size:0.9rem;font-weight:900;}
  .na-cell{padding:4px 2px;border-top:1px solid rgba(5,50,41,0.06);display:flex;justify-content:center;align-items:center;background:rgba(188,221,220,0.07);}
  .na-dot{width:7px;height:7px;border-radius:50%;background:rgba(5,50,41,0.1);}

  .bl{padding:6px 10px 6px 10px;font-size:0.82rem;font-weight:700;color:var(--peacock);background:white;border-top:1px solid rgba(5,50,41,0.06);display:flex;align-items:center;gap:3px;word-break:break-word;white-space:normal;line-height:1.3;}
  .bc{padding:4px 2px;border-top:1px solid rgba(5,50,41,0.06);display:flex;justify-content:center;align-items:center;background:white;}
  .mini{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--kc,var(--sapphire));background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:800;transition:all 0.18s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0;}
  .mini:active{transform:scale(0.88);}
  .mini.on{background:var(--kc,var(--sapphire));border-color:var(--kc);color:white;}

  /* journal popup CSS removed */

  /* ── STAMPS ── */
  .stamps-wrap{display:flex;flex-direction:column;gap:14px;}
  .scard{background:white;border-radius:16px;padding:16px 18px;box-shadow:0 4px 16px var(--shadow);position:relative;overflow:hidden;}
  .scard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;}
  .lizzy-card::before{background:var(--sapphire);}.emily-card::before{background:var(--ballet);}.claire-card::before{background:#E8873A;}
  .scard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .scard-top h3{font-family:'Google Sans Display',sans-serif;font-size:1rem;font-weight:800;color:var(--peacock);}
  .sbig{font-family:'Google Sans Display',sans-serif;font-size:1.8rem;font-weight:800;}
  .lizzy-card .sbig{color:var(--sapphire);}.emily-card .sbig{color:var(--ballet);}.claire-card .sbig{color:#E8873A;}

  /* stamp journey grid — big slots */
  .journey{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-bottom:7px;}
  .jslot{
    aspect-ratio:1;border-radius:9px;border:2px solid rgba(5,50,41,0.08);
    background:#ebebeb;display:flex;align-items:center;justify-content:center;
    transition:all 0.2s;overflow:hidden;position:relative;
  }
  .jslot.filled{border-color:transparent;}
  .jslot.goal{border:2.5px dashed #bbb;background:#ebebeb;}
  .jslot.goal.filled{border-color:transparent;}
  .jslot .goal-icon{font-size:1.1rem;filter:grayscale(1);opacity:0.35;}
  .jslot.goal.filled .goal-icon{filter:none;opacity:1;}
  .jslot img{width:82%;height:82%;object-fit:contain;display:block;margin:auto;mix-blend-mode:multiply;}
  .jslot.empty-slot img{filter:grayscale(1);opacity:0.22;}
  .jslot.filled img{filter:none;opacity:1;mix-blend-mode:multiply;}

  .rbar{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:9px;background:var(--lace);margin-top:4px;}
  .rlbl{font-size:0.74rem;font-weight:800;color:var(--peacock);flex:1;}
  .rbg{flex:2;height:7px;background:rgba(5,50,41,0.1);border-radius:4px;overflow:hidden;}
  .rfill{height:100%;border-radius:4px;transition:width 0.5s ease;}
  .lizzy-card .rfill{background:var(--sapphire);}.emily-card .rfill{background:var(--ballet);}.claire-card .rfill{background:#E8873A;}
  .rwon{font-size:0.74rem;font-weight:800;color:#B89D47;}

  /* ── HISTORY ── */
  .hist-wrap{display:flex;flex-direction:column;gap:14px;}
  .hist-toggle{display:flex;gap:6px;justify-content:flex-start;margin-top:14px;margin-bottom:12px;}
  .htab{padding:6px 18px;border-radius:20px;border:2px solid var(--arctic);background:white;font-family:'Google Sans Display',sans-serif;font-weight:700;font-size:0.85rem;color:var(--peacock);cursor:pointer;transition:all 0.18s;}
  .htab.active{background:var(--spruce);color:white;border-color:var(--spruce);}
  .hist-card{background:white;border-radius:16px;padding:16px 18px;box-shadow:0 4px 16px var(--shadow);}
  .hist-card h3{font-family:'Google Sans Display',sans-serif;font-size:0.95rem;font-weight:800;color:var(--peacock);margin-bottom:10px;display:flex;align-items:center;gap:6px;}

  /* weekly grid */
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:0.75rem;}
  .wg-head{text-align:center;font-weight:700;color:var(--spruce);padding:4px 2px;}
  .wg-cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:1px;overflow:hidden;border:1.5px solid rgba(5,50,41,0.08);}
  .wg-cell.full{background:rgba(114,176,171,0.25);border-color:rgba(114,176,171,0.5);}
  .wg-cell.partial{background:rgba(255,237,209,0.9);border-color:rgba(207,185,126,0.5);}
  .wg-cell.none{background:rgba(5,50,41,0.04);}
  .wg-cell.future{background:transparent;border-color:transparent;}

  /* monthly grid */
  .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .month-nav span{font-family:'Google Sans Display',sans-serif;font-weight:800;font-size:0.9rem;color:var(--peacock);}
  .month-nav button{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--spruce);padding:2px 8px;}
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;}
  .mg-day-head{text-align:center;font-size:0.65rem;font-weight:800;color:var(--spruce);padding:2px;}
  .mg-cell{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px solid rgba(5,50,41,0.07);background:rgba(5,50,41,0.02);cursor:default;position:relative;}
  .mg-cell.today-cell{border:2px solid var(--ballet);}
  .mg-cell.has-stamps{background:var(--lace);}
  .mg-num{font-size:0.6rem;font-weight:800;color:var(--spruce);line-height:1;margin-bottom:1px;}
  .mg-dots{display:flex;gap:1px;flex-wrap:wrap;justify-content:center;max-width:24px;}
  .mg-dot{width:5px;height:5px;border-radius:50%;}
  .month-legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
  .mleg{display:flex;align-items:center;gap:4px;font-size:0.7rem;font-weight:700;color:var(--spruce);}
  .mleg-dot{width:9px;height:9px;border-radius:50%;}

  /* SETTINGS */
  .spanel{background:white;border-radius:16px;padding:20px;box-shadow:0 4px 16px var(--shadow);}
  .spanel h2{font-family:'Google Sans Display',sans-serif;font-size:1.15rem;font-weight:800;color:var(--peacock);margin-bottom:3px;text-align:left;}
  .spanel p{color:var(--spruce);font-size:0.83rem;margin-bottom:14px;}
  .lgate{text-align:center;padding:18px;}
  .licon{font-size:2.2rem;margin-bottom:10px;}
  .lgate p{font-weight:700;color:var(--peacock);margin-bottom:10px;font-size:0.88rem;}
  .pins{display:flex;gap:7px;justify-content:center;margin-bottom:12px;}
  .pin{width:42px;height:42px;border:2.5px solid var(--arctic);border-radius:9px;text-align:center;font-size:1.2rem;font-weight:800;color:var(--peacock);font-family:'Google Sans Display',sans-serif;}
  .pin:focus{outline:none;border-color:var(--sapphire);}
  .btn{padding:9px 20px;border-radius:30px;border:none;font-family:'Google Sans Display',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px var(--shadow);}
  .btn-p{background:var(--peacock);color:white;}.btn-s{background:var(--arctic);color:var(--peacock);}.btn-d{background:#ff6b6b;color:white;}
  .btn-sm{padding:5px 13px;font-size:0.78rem;}
  .redit{display:none;}.redit.open{display:block;}
  .ksec{margin-bottom:18px;padding:14px;background:var(--lace);border-radius:12px;}
  .ksec h3{font-family:'Google Sans Display',sans-serif;font-size:0.9rem;font-weight:800;color:var(--peacock);margin-bottom:8px;text-align:left;}
  .tlist{list-style:none;margin-bottom:8px;}
  .tedit{display:flex;align-items:center;justify-content:flex-start;gap:2px;margin-bottom:5px;background:white;border-radius:7px;padding:5px 9px;text-align:left;}
  .tedit span{font-size:0.78rem;font-weight:600;color:var(--peacock);text-align:left;padding-left:2px;}
  .tdel{background:none;border:none;color:#ff6b6b;cursor:pointer;font-size:0.9rem;padding:2px 4px;border-radius:4px;}
  .tdel:hover{background:#ffe0e0;}
  .tadd{display:flex;gap:6px;}
  .tinp{flex:1;border:2px solid var(--arctic);border-radius:7px;padding:6px 10px;font-family:'Google Sans',sans-serif;font-size:0.78rem;font-weight:600;color:var(--peacock);}
  .tinp:focus{outline:none;border-color:var(--sapphire);}
  .errmsg{color:#e05;font-size:0.78rem;font-weight:700;margin-top:5px;}

  .celeb{position:fixed;inset:0;background:rgba(5,50,41,0.65);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.25s;}
  .celeb.show{opacity:1;pointer-events:all;}
  .cbox{background:white;border-radius:20px;padding:28px 24px;text-align:center;max-width:320px;width:90%;transform:scale(0.85);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}
  .celeb.show .cbox{transform:scale(1);}
  .cbox h2{font-family:'Google Sans Display',sans-serif;font-size:1.5rem;font-weight:800;color:var(--peacock);margin:10px 0 5px;}
  .cbox p{color:var(--spruce);font-size:0.88rem;font-weight:600;margin-bottom:16px;}
  .cemoji{font-size:2.2rem;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--peacock);color:white;padding:9px 22px;border-radius:30px;font-weight:700;font-size:0.84rem;z-index:999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:0 5px 18px rgba(5,50,41,0.3);}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:480px){
    .ftab{padding:6px 10px 8px;font-size:0.78rem;}
    .topbar-title{font-size:0.82rem;}
    .week-grid{gap:3px;}
  }
</style>
</head>
<body>
<div class="app">
  <!-- COMPACT HEADER: app title on top, date nav + tabs on bottom -->
  <div class="topbar">
    <div class="topbar-app-title"><span id="appTitleEl">Daily Routine</span> ⭐</div>
    <div class="topbar-row">
      <div class="topbar-date">
        <button id="navPrev" onclick="shiftView(-1)">◀</button>
        <span id="todayDate"></span>
        <button id="navNext" onclick="shiftView(1)">▶</button>
      </div>
      <div class="folder-tabs">
        <button class="ftab active" onclick="showSec('tracker',this)">Today</button>
        <button class="ftab" onclick="showSec('stamps',this)">Stamps</button>
        <button class="ftab" onclick="showSec('history',this)">History</button>
        <button class="ftab" onclick="showSec('settings',this)">Settings</button>
      </div>
    </div>
  </div>

  <!-- TODAY -->
  <div class="section active" id="section-tracker">
    <div class="table-wrap">
      <div class="tracker-grid" id="trackerGrid"></div>
    </div>
  </div>

  <!-- STAMPS -->
  <div class="section" id="section-stamps">
    <div class="stamps-wrap" id="stampsArea"></div>
  </div>

  <!-- HISTORY -->
  <div class="section" id="section-history">
    <div class="hist-toggle">
      <button class="htab active" id="htab-week" onclick="switchHist('week',this)">📅 This Week</button>
      <button class="htab" id="htab-month" onclick="switchHist('month',this)">🗓 Monthly</button>
    </div>
    <div id="hist-week-view"></div>
    <div id="hist-month-view" style="display:none"></div>
  </div>

  <!-- BACKDATE PANEL (modal overlay) -->
  <div id="backdatePanel" style="display:none;position:fixed;inset:0;background:rgba(5,50,41,0.6);z-index:600;overflow-y:auto;padding:16px;">
    <div style="background:white;border-radius:18px;padding:20px;max-width:520px;width:100%;margin:auto;box-shadow:0 12px 40px rgba(5,50,41,0.3);">
      <h3 style="font-family:'Google Sans Display',sans-serif;font-weight:800;color:var(--peacock);margin-bottom:12px;">📅 Edit Past Day</h3>
      <div id="bdContent"></div>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="section" id="section-settings">
    <div class="spanel">
      <h2>⚙️ Customize Routines</h2>
      <p>Parents can edit daily routines and to-do lists here.</p>
      <div class="lgate" id="lockGate">
        <div class="licon">🔒</div>
        <p>Enter the 4-digit parent PIN</p>
        <div class="pins">
          <input type="password" maxlength="1" class="pin" id="p1" oninput="mf(this,'p2')" onkeydown="pk(event,this,'')">
          <input type="password" maxlength="1" class="pin" id="p2" oninput="mf(this,'p3')" onkeydown="pk(event,this,'p1')">
          <input type="password" maxlength="1" class="pin" id="p3" oninput="mf(this,'p4')" onkeydown="pk(event,this,'p2')">
          <input type="password" maxlength="1" class="pin" id="p4" oninput="mf(this,null)" onkeydown="pk(event,this,'p3')">
        </div>
        <button class="btn btn-p" onclick="checkPin()">Unlock</button>
        <div class="errmsg" id="pinErr" style="display:none">❌ Wrong PIN!</div>
        <div style="margin-top:10px;font-size:0.72rem;color:var(--spruce);font-weight:600">Default PIN: 1234</div>
      </div>
      <div class="redit" id="routinesEditor">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <span style="color:var(--spruce);font-weight:700;font-size:0.82rem">🔓 Unlocked</span>
          <div style="display:flex;gap:5px">
            <button class="btn btn-s btn-sm" onclick="changePin()">Change PIN</button>
            <button class="btn btn-d btn-sm" onclick="lockSettings()">Lock</button>
          </div>
        </div>
        <div id="reContent"></div>
        <button class="btn btn-p" onclick="saveRoutines()" style="margin-top:12px">💾 Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- journal popup removed - manual toggle -->

<div class="celeb" id="celeb">
  <div class="cbox">
    <div class="cemoji" id="cemoji">🎉</div>
    <h2 id="ctitle">Amazing!</h2>
    <p id="cmsg">You earned a stamp!</p>
    <button class="btn btn-p" onclick="closeC()">Yay! 🎊</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

let S=(()=>{try{const s=JSON.parse(localStorage.getItem('rt5'));if(s){if(!s.labels)s.labels=JSON.parse(JSON.stringify(DEF_LABELS));return s;}}catch(e){}
  return{pin:'1234',routines:JSON.parse(JSON.stringify(DEF)),labels:JSON.parse(JSON.stringify(DEF_LABELS)),checks:{},bonus:{},stamps:{}};})();

const today=()=>new Date().toISOString().slice(0,10);
const todayLbl=()=>new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

function ensure(){
  const d=today();
  if(!S.checks[d])S.checks[d]={};if(!S.bonus[d])S.bonus[d]={};
  KIDS.forEach(k=>{
    if(!S.checks[d][k])S.checks[d][k]={};
    if(!S.bonus[d][k])S.bonus[d][k]={journal:false,readKo:false,readEn:false,jtext:''};
    if(!S.stamps[k])S.stamps[k]={daily:{}};
    if(!S.stamps[k].daily[d])S.stamps[k].daily[d]=[];
  });
}

const getMorn=k=>S.routines[`morning_${k}`]||[];
const getAfter=k=>S.routines[`afterschool_${k}`]||[];
const allTasks=k=>[...getMorn(k).map((t,i)=>({key:`m${i}`,t})),...getAfter(k).map((t,i)=>({key:`a${i}`,t}))];

// ── VIEW DATE (can browse past days) ─────────────────────────
let viewDate=today();

function setViewDate(d){
  viewDate=d;
  const lbl=new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  document.getElementById('todayDate').textContent=lbl;
  renderTable();
}

function shiftView(delta){
  const d=new Date(viewDate+'T12:00:00');
  d.setDate(d.getDate()+delta);
  setViewDate(d.toISOString().slice(0,10));
}

const isOn=(k,key)=>!!(S.checks[viewDate]?.[k]?.[key]);
const isOnDate=(k,key,d)=>!!(S.checks[d]?.[k]?.[key]);

function toggle(k,key){
  const d=viewDate;
  // Ensure data exists for this date
  if(!S.checks[d])S.checks[d]={};
  if(!S.checks[d][k])S.checks[d][k]={};
  if(!S.bonus[d])S.bonus[d]={};
  if(!S.bonus[d][k])S.bonus[d][k]={journal:false,readKo:false,readEn:false,jtext:''};
  if(!S.stamps[k])S.stamps[k]={daily:{}};
  if(!S.stamps[k].daily[d])S.stamps[k].daily[d]=[];
  S.checks[d][k][key]=!S.checks[d][k][key];
  save();upProg();checkStamps(k);renderTable();
}
function prog(k){
  const t=allTasks(k);if(!t.length)return{done:0,total:0,pct:0};
  const done=t.filter(x=>isOn(k,x.key)).length;
  return{done,total:t.length,pct:Math.round(done/t.length*100)};
}
function upProg(){

function checkStamps(k){
  const d=viewDate;
  if(!S.stamps[k])S.stamps[k]={daily:{}};
  if(!S.stamps[k].daily[d])S.stamps[k].daily[d]=[];
  const st=S.stamps[k].daily[d];
  // Morning stamp
  const mTasks=getMorn(k);
  const mDone=mTasks.length>0&&mTasks.every((_,i)=>isOn(k,'m'+i));
  if(mDone&&!st.includes('morning')){
    st.push('morning');save();
    celebrate(KNAMES[k],'☀️ Morning routine done! +1 stamp!','⭐');

  // Afterschool stamp
  const aTasks=getAfter(k);
  const aDone=aTasks.length>0&&aTasks.every((_,i)=>isOn(k,'a'+i));
  if(aDone&&!st.includes('after')){
    st.push('after');save();
    celebrate(KNAMES[k],'🎒 After school done! +1 stamp!','⭐');
    if(document.getElementById('section-stamps').classList.contains('active'))renderStamps();
  }
}
function awardBonus(k,type,lbl){
  const d=viewDate;
  if(!S.stamps[k])S.stamps[k]={daily:{}};
  if(!S.stamps[k].daily[d])S.stamps[k].daily[d]=[];
  const st=S.stamps[k].daily[d];
  if(!st.includes('b_'+type)){st.push('b_'+type);save();celebrate(KNAMES[k],`⭐ Bonus stamp: ${lbl}`,'⭐');
    if(document.getElementById('section-stamps').classList.contains('active'))renderStamps();}
}
function removeBonus(k,type){
  const d=viewDate;
  if(!S.stamps[k]?.daily?.[d]) return;
  const st=S.stamps[k].daily[d];const i=st.indexOf('b_'+type);
  if(i>-1){st.splice(i,1);save();if(document.getElementById('section-stamps').classList.contains('active'))renderStamps();}
}

// ── STAMPS ───────────────────────────────────────────────────
function renderStamps(){
  ensure();
  const container=document.getElementById('stampsArea');
  let html='';
  KIDS.forEach(k=>{
    const total=totalStamps(k);
    const todList=todayStamps(k);
    const c=KCOL[k];
    const reward=KID_REWARD[k];
    const cycles=Math.floor(total/GOAL);
    const pos=total%GOAL; // stamps in current cycle
    const pct=Math.min(pos/GOAL*100,100);
    const won=cycles*reward;
    // Collect all stamps in chronological order
    const all=[];
    Object.entries(S.stamps[k]?.daily||{}).sort().forEach(([,arr])=>all.push(...arr));
    // Current cycle starts after completed cycles
    const cur=all.slice(cycles*GOAL);
    let slots='';
    for(let i=0;i<GOAL;i++){
      const filled=i<cur.length;
      const isGoal=i===GOAL-1;
      if(isGoal){
        slots+=`<div class="jslot${filled?' filled':' empty-slot'} goal" style="${filled?`background:${c}25;border-color:${c}70;`:''}">
          ${filled?ANIMAL_SVG(k,c):`<span class="goal-icon">💰</span>`}
        </div>`;
      } else {
        slots+=`<div class="jslot${filled?' filled':' empty-slot'}" style="${filled?`background:${c}25;border-color:${c}70;`:''}">
          ${ANIMAL_SVG(k,c)}
        </div>`;
      }
    }
    html+=`<div class="scard ${k}-card">
      <div class="scard-top">
        <h3>${KNAMES[k]}</h3>
        <div><span class="sbig">${pos}</span><span style="font-size:0.7rem;font-weight:800;color:var(--spruce)"> / ${GOAL}</span></div>
      </div>
      <div class="journey">${slots}</div>
      <div class="rbar">
        <div class="rlbl">🎯 20 stamps = ₩${reward.toLocaleString()}${cycles>0?` &nbsp;·&nbsp; Cycle ${cycles+1}`:''}
        </div>
        <div class="rbg"><div class="rfill" style="width:${pct}%"></div></div>
        <div class="rwon">${won>0?`₩${won.toLocaleString()} earned!`:'₩0'}</div>
      </div>
      <div style="font-size:0.7rem;color:var(--spruce);font-weight:700;margin-top:6px;text-align:center">
        Today: ${todList.length} stamp${todList.length!==1?'s':''} &nbsp;·&nbsp; All time: ${total}
      </div>
    </div>`;
  });
  container.innerHTML=html;
}

// ── HISTORY ──────────────────────────────────────────────────
let histMode='week';
let histMonthDate=new Date();

function switchHist(mode,el){
  histMode=mode;
  document.querySelectorAll('.htab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('hist-week-view').style.display=mode==='week'?'':'none';
  document.getElementById('hist-month-view').style.display=mode==='month'?'':'none';
  if(mode==='week')renderWeek();
  else renderMonth();
}

function getWeekDays(){
  const now=new Date();
  const dow=now.getDay(); // 0=sun
  const monday=new Date(now);
  monday.setDate(now.getDate()-(dow===0?6:dow-1));
  return Array.from({length:7},(_,i)=>{
    const d=new Date(monday);d.setDate(monday.getDate()+i);
    return d.toISOString().slice(0,10);
  });
}

function stampCountForDay(k,dateStr){
  return(S.stamps[k]?.daily?.[dateStr]||[]).length;
}
function maxTasksForDay(k){return allTasks(k).length;}

function renderWeek(){
  const days=getWeekDays();
  const dayLabels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const todStr=today();
  let html=`<div class="hist-wrap">`;

  const kidTitles={lizzy:"Lizzy's Week",emily:"Emily's Week",claire:"Claire's Week"};

  KIDS.forEach(k=>{
    const c=KCOL[k];
    // 7-column grid, no sidebar name column
    let grid=`<div class="week-grid">`;
    dayLabels.forEach((d,i)=>{
      const isTod=days[i]===todStr;
      grid+=`<div class="wg-head" style="${isTod?`color:${c};font-weight:800;`:''}">${d}</div>`;
    });
    days.forEach(dateStr=>{
      const isF=dateStr>todStr;
      const dayStamps=(S.stamps[k]?.daily?.[dateStr]||[]);
      const cnt=dayStamps.length;
      const full=cnt>=3;
      const partial=cnt>0&&!full;
      const cellStyle=isF?''
        :full?`background:${c}30;border-color:${c}80;`
        :partial?`background:${c}14;border-color:${c}40;`
        :'background:rgba(5,50,41,0.03);';
      grid+=`<div class="wg-cell${isF?' future':''}" style="${cellStyle}">`;
      if(!isF&&full){
        grid+=ANIMAL_SVG(k,c,'82%');
      } else if(!isF&&partial){
        // Full icon but desaturated/faded to show partial
        grid+=`<div style="width:82%;height:82%;filter:grayscale(60%) opacity(0.55);display:flex;align-items:center;justify-content:center;">${ANIMAL_SVG(k,c,'100%')}</div>`;
      } else if(!isF){
        grid+=`<span style="font-size:0.8rem;color:rgba(5,50,41,0.15)">–</span>`;
      }
      grid+=`</div>`;
    });
    grid+=`</div>`;
    html+=`<div class="hist-card"><h3 style="font-size:0.95rem;font-weight:800;color:var(--peacock);margin-bottom:10px;">${kidTitles[k]}</h3>${grid}</div>`;
  });
  html+=`</div>`;
  document.getElementById('hist-week-view').innerHTML=html;
}

function renderMonth(){
  const year=histMonthDate.getFullYear();
  const month=histMonthDate.getMonth();
  const todStr=today();
  const monthName=histMonthDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDow=new Date(year,month,1).getDay(); // 0=Sun
  const startOffset=(firstDow+6)%7; // Mon-based

  let html=`<div class="hist-wrap">`;
  KIDS.forEach(k=>{
    const c=KCOL[k];
    let cal=`<div class="month-nav">
      <button onclick="changeMonth(-1)">◀</button>
      <span>${monthName}</span>
      <button onclick="changeMonth(1)">▶</button>
    </div>`;
    cal+=`<div class="month-grid">`;
    ['M','T','W','T','F','S','S'].forEach(d=>cal+=`<div class="mg-day-head">${d}</div>`);
    for(let i=0;i<startOffset;i++) cal+=`<div class="mg-cell"></div>`;
    for(let day=1;day<=daysInMonth;day++){
      const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const isTod=dateStr===todStr;
      const isFut=dateStr>todStr;
      const cnt=stampCountForDay(k,dateStr);
      const hasStamps=cnt>0;
      cal+=`<div class="mg-cell${hasStamps?' has-stamps':''}${isTod?' today-cell':''}" style="${hasStamps&&!isFut?`background:${c}18;border-color:${c}60`:''}">
        <div class="mg-num" style="${isTod?`color:${c};font-size:0.65rem`:''}">${day}${isTod?'◉':''}</div>
        ${hasStamps&&!isFut?`<div style="width:70%;margin:auto">${ANIMAL_SVG(k,c,'100%')}</div>`:`<div style="width:60%;margin:auto;opacity:0.1">${ANIMAL_SVG(k,c,'100%')}</div>`}
      </div>`;
    }
    cal+=`</div>`;
    html+=`<div class="hist-card"><h3 style="font-size:0.95rem;font-weight:800;color:var(--peacock);margin-bottom:10px;">${KNAMES[k].split(' ')[1]}'s Month</h3>${cal}</div>`;
  });
  html+=`</div>`;
  document.getElementById('hist-month-view').innerHTML=html;
}

function changeMonth(delta){
  histMonthDate=new Date(histMonthDate.getFullYear(),histMonthDate.getMonth()+delta,1);
  renderMonth();
}

}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.style.background='#f0f8ff';
  return false;
}
function dragEnd(){
  document.querySelectorAll('.tedit[draggable]').forEach(el=>{
    el.style.opacity='1';el.style.background='white';
  });
}
function dragDrop(e,target){
  e.stopPropagation();
  if(dragSrc===target) return false;
  const sec=dragSrc.dataset.sec;
  const fromIdx=parseInt(dragSrc.dataset.idx);
  const toIdx=parseInt(target.dataset.idx);
  const arr=S.routines[sec];
  const [moved]=arr.splice(fromIdx,1);
  arr.splice(toIdx,0,moved);
  save();renderEditor();
  return false;
}

// ── STAMP MANAGEMENT ─────────────────────────────────────────
function removeOneStamp(k){
  const d=today();ensure();
  const st=S.stamps[k].daily[d];
  if(st.length===0){showToast(`${KNAMES[k]} has no stamps today`);return;}
  st.pop();save();renderEditor();showToast(`🏅 Removed 1 stamp from ${KNAMES[k]}`);
}
function resetTodayStamps(k){
  const d=today();ensure();
  const count=S.stamps[k].daily[d].length;
  if(count===0){showToast(`${KNAMES[k]} has no stamps today`);return;}
  S.stamps[k].daily[d]=[];save();renderEditor();
  showToast(`🗑 Cleared today's stamps for ${KNAMES[k]}`);
}
function confirmResetAll(k){
  if(confirm(`Reset ALL stamps for ${KNAMES[k]}? This cannot be undone.`)){
    S.stamps[k]={daily:{}};save();renderEditor();
    showToast(`🗑 All stamps reset for ${KNAMES[k]}`);
  }
}

// ── BACK-DATE EDITOR ─────────────────────────────────────────
let backdateOpen=false;
let backdateDate=today();

function openBackdate(){
  backdateOpen=true;
  backdateDate=today();
  renderBackdateUI();
  document.getElementById('backdatePanel').style.display='block';
}
function closeBackdate(){
  document.getElementById('backdatePanel').style.display='none';
  backdateOpen=false;
}

function renderBackdateUI(){
  const d=backdateDate;
  const label=new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  // ensure structures for this date
  if(!S.checks[d])S.checks[d]={};if(!S.bonus[d])S.bonus[d]={};
  KIDS.forEach(k=>{
    if(!S.checks[d][k])S.checks[d][k]={};
    if(!S.bonus[d][k])S.bonus[d][k]={journal:false,readKo:false,readEn:false,jtext:''};
    if(!S.stamps[k])S.stamps[k]={daily:{}};
    if(!S.stamps[k].daily[d])S.stamps[k].daily[d]=[];
  });

  let h=`<div style="font-family:'Google Sans',sans-serif;">`;
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <button onclick="shiftBdDate(-1)" class="btn btn-s btn-sm">◀</button>
      <span style="font-weight:800;color:var(--peacock);font-size:0.9rem">${label}</span>
      <button onclick="shiftBdDate(1)" class="btn btn-s btn-sm" ${d>=today()?'disabled style="opacity:0.4"':''}>▶</button>
    </div>
    <button onclick="closeBackdate()" class="btn btn-s btn-sm">✕ Close</button>
  </div>`;

  KIDS.forEach(k=>{
    const c=KCOL[k];
    const mTasks=getMorn(k), aTasks=getAfter(k);
    const allSt=S.stamps[k].daily[d]||[];
    h+=`<div style="border-left:4px solid ${c};padding:8px 12px;background:var(--lace);border-radius:8px;margin-bottom:10px;">`;
    h+=`<div style="font-weight:800;font-size:0.88rem;color:var(--peacock);margin-bottom:6px;">${KNAMES[k]}</div>`;

    // Morning tasks
    h+=`<div style="font-size:0.75rem;font-weight:700;color:var(--spruce);margin-bottom:4px;">☀️ Morning</div>`;
    mTasks.forEach((t,i)=>{
      const on=isOnDate(k,'m'+i,d);
      h+=`<label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;margin-bottom:3px;cursor:pointer;">
        <input type="checkbox" ${on?'checked':''} onchange="toggleBackdate('${k}','m${i}','${d}')" style="width:16px;height:16px;accent-color:${c};">
        ${t}
      </label>`;
    });
    // After school tasks
    h+=`<div style="font-size:0.75rem;font-weight:700;color:var(--spruce);margin:6px 0 4px;">🎒 After School</div>`;
    aTasks.forEach((t,i)=>{
      const on=isOnDate(k,'a'+i,d);
      h+=`<label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;margin-bottom:3px;cursor:pointer;">
        <input type="checkbox" ${on?'checked':''} onchange="toggleBackdate('${k}','a${i}','${d}')" style="width:16px;height:16px;accent-color:${c};">
        ${t}
      </label>`;
    });
    // Bonus & stamps
    const b=S.bonus[d][k]||{};
    h+=`<div style="font-size:0.75rem;font-weight:700;color:var(--spruce);margin:6px 0 4px;">⭐ Bonus & Stamps</div>`;
    [
      {key:'journal',label:'📔 Journal',prop:'journal'},
      {key:'ko',label:'🇰🇷 Korean book',prop:'readKo'},
      {key:'en',label:'🇺🇸 English book',prop:'readEn'},
    ].forEach(item=>{
      const on=b[item.prop];
      h+=`<label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;margin-bottom:3px;cursor:pointer;">
        <input type="checkbox" ${on?'checked':''} onchange="toggleBdBonus('${k}','${item.key}','${item.prop}','${d}')" style="width:16px;height:16px;accent-color:${c};">
        ${item.label}
      </label>`;
    });

    // Direct stamp management for this date
    const stampCount=allSt.length;
    h+=`<div style="margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span style="font-size:0.75rem;font-weight:700;color:var(--spruce)">Stamps on this day: <b>${stampCount}</b></span>
      <button class="btn btn-s btn-sm" style="padding:3px 10px;font-size:0.72rem;" onclick="bdAddStamp('${k}','${d}')">+ Stamp</button>
      <button class="btn btn-s btn-sm" style="padding:3px 10px;font-size:0.72rem;background:#fff3f3;color:#c33;border:1.5px solid #fcc;" onclick="bdRemoveStamp('${k}','${d}')">− Stamp</button>
    </div>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  document.getElementById('bdContent').innerHTML=h;
}

function shiftBdDate(delta){
  const d=new Date(backdateDate+'T12:00:00');
  d.setDate(d.getDate()+delta);
  const newD=d.toISOString().slice(0,10);
  if(newD>today()) return;
  backdateDate=newD;
  renderBackdateUI();
}

function toggleBackdate(k,key,d){
  if(!S.checks[d])S.checks[d]={};
  if(!S.checks[d][k])S.checks[d][k]={};
  S.checks[d][k][key]=!S.checks[d][k][key];
  // recalc stamps for this date automatically
  recalcStampsForDate(k,d);
  save();renderBackdateUI();
  if(document.getElementById('section-tracker').classList.contains('active'))renderTable();
}

function toggleBdBonus(k,type,prop,d){
  if(!S.bonus[d])S.bonus[d]={};
  if(!S.bonus[d][k])S.bonus[d][k]={journal:false,readKo:false,readEn:false,jtext:''};
  S.bonus[d][k][prop]=!S.bonus[d][k][prop];
  recalcStampsForDate(k,d);
  save();renderBackdateUI();
}

function bdAddStamp(k,d){
  if(!S.stamps[k])S.stamps[k]={daily:{}};
  if(!S.stamps[k].daily[d])S.stamps[k].daily[d]=[];
  S.stamps[k].daily[d].push('manual');
  save();renderBackdateUI();
  if(document.getElementById('section-stamps').classList.contains('active'))renderStamps();
}
function bdRemoveStamp(k,d){
  if(!S.stamps[k]?.daily?.[d]?.length) return;
  S.stamps[k].daily[d].pop();
  save();renderBackdateUI();
  if(document.getElementById('section-stamps').classList.contains('active'))renderStamps();
}

function recalcStampsForDate(k,d){
  if(!S.stamps[k])S.stamps[k]={daily:{}};
  const existing=S.stamps[k].daily[d]||[];
  // Remove auto-computed stamps, keep manual ones
  const manual=existing.filter(s=>s==='manual');
  const newSt=[...manual];
  // Morning
  const mT=getMorn(k);
  if(mT.length&&mT.every((_,i)=>!!(S.checks[d]?.[k]?.['m'+i]))) newSt.push('morning');
  // After
  const aT=getAfter(k);
  if(aT.length&&aT.every((_,i)=>!!(S.checks[d]?.[k]?.['a'+i]))) newSt.push('after');
  // Bonus
  const b=S.bonus[d]?.[k]||{};
  if(b.journal) newSt.push('b_journal');
  if(b.readKo) newSt.push('b_ko');
  if(b.readEn) newSt.push('b_en');
  S.stamps[k].daily[d]=newSt;
}

// ── 8. SAVE HTML (export current state) ──────────────────────
function saveHtmlFile(){
  // Embed current state into a clone of this page
  const stateJson=JSON.stringify(S).replace(/</g,'\u003c').replace(/>/g,'\u003e');
  const scriptPatch=`<script>
// EMBEDDED STATE (saved ${new Date().toLocaleString()})
try{ localStorage.setItem('rt5', ${JSON.stringify(JSON.stringify(S))}); }catch(e){}
<`+`/script>`;
  const cloneHtml=document.documentElement.outerHTML.replace('</body>', scriptPatch+'</body>');
  const blob=new Blob([cloneHtml],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='daily-routine-'+ new Date().toISOString().slice(0,10)+'.html';
  a.click();
  showToast('💾 Saved as HTML file!');
}

// ── UI ───────────────────────────────────────────────────────
function showSec(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`section-${id}`).classList.add('active');
  el.classList.add('active');
  if(id==='tracker')renderTable();
  if(id==='stamps')renderStamps();
  if(id==='history'){histMode='week';document.getElementById('htab-week').classList.add('active');document.getElementById('htab-month').classList.remove('active');document.getElementById('hist-week-view').style.display='';document.getElementById('hist-month-view').style.display='none';renderWeek();}
}
let cT;
function celebrate(name,msg,emoji){
  document.getElementById('cemoji').textContent=emoji;
  document.getElementById('ctitle').textContent=name;
  document.getElementById('cmsg').textContent=msg;
  document.getElementById('celeb').classList.add('show');
  if(cT)clearTimeout(cT);cT=setTimeout(closeC,4000);
}
function closeC(){document.getElementById('celeb').classList.remove('show');}
let tT;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  if(tT)clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2500);
}

// INIT
// ── DAILY RESET GUARD ────────────────────────────────────────
// If the app was last used on a different day, wipe today's slate so
// checkboxes always start fresh each new day regardless of cache.
(function(){
  const d=today();
  const lastOpen=localStorage.getItem('rt5_lastopen');
  if(lastOpen && lastOpen!==d){
    // New day: clear today's checks and bonus so nothing carries over
    if(S.checks[d]) S.checks[d]={};
    if(S.bonus[d])  S.bonus[d]={};
    KIDS.forEach(k=>{
      S.checks[d][k]={};
      S.bonus[d][k]={journal:false,readKo:false,readEn:false,jtext:''};
      if(!S.stamps[k])         S.stamps[k]={daily:{}};
      if(!S.stamps[k].daily[d]) S.stamps[k].daily[d]=[];
    });
    save();
  }
  localStorage.setItem('rt5_lastopen', d);
})();

document.getElementById('appTitleEl').textContent=S.labels.appTitle;
setViewDate(today());
ensure();

function _doNewDay(){
  const now=today();
  _lastDate=now;
  viewDate=now;
  S.checks[now]={};S.bonus[now]={};
  KIDS.forEach(k=>{
    S.checks[now][k]={};
    S.bonus[now][k]={journal:false,readKo:false,readEn:false,jtext:''};
    if(!S.stamps[k])          S.stamps[k]={daily:{}};
    if(!S.stamps[k].daily[now]) S.stamps[k].daily[now]=[];
  });
  save();
  localStorage.setItem('rt5_lastopen', now);
  setViewDate(now);
  const active=document.querySelector('.section.active');
  if(active){
    if(active.id==='section-stamps')  renderStamps();
    if(active.id==='section-history') renderWeek();
  }
  showToast('☀️ Good morning! New day started.');
}

// ── AUTO REFRESH ON DATE CHANGE ──────────────────────────────
let _lastDate=today();
setInterval(()=>{
  if(today()!==_lastDate) _doNewDay();
},60000);

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && today()!==_lastDate) _doNewDay();
});
